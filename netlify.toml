[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Redirect old /arch/* URLs to new flat structure
[[redirects]]
  from = "/arch"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/arch/portfolio"
  to = "/portfolio"
  status = 301
  force = true

[[redirects]]
  from = "/arch/portfolio/:id"
  to = "/portfolio/:id"
  status = 301
  force = true

[[redirects]]
  from = "/arch/about"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/arch/contact"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/arch/services"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/arch/services/*"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/intelligence"
  to = "/"
  status = 301
  force = true

# Redirect old /work URLs to /portfolio
[[redirects]]
  from = "/work"
  to = "/portfolio"
  status = 301
  force = true

[[redirects]]
  from = "/work/*"
  to = "/portfolio"
  status = 301
  force = true

# Redirect old /insights to /journal
[[redirects]]
  from = "/insights"
  to = "/journal"
  status = 301
  force = true

# SPA fallback for Next.js static export
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — applied to every page
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent the site from being embedded in iframes (clickjacking protection)
    X-Frame-Options = "DENY"
    # Stop browsers from guessing content types (MIME sniffing protection)
    X-Content-Type-Options = "nosniff"
    # Control how much referrer info is shared when navigating away
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 1 year (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Disable browser features you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), magnetometer=()"
    # Content Security Policy — restrict what can load on your pages
    # unsafe-inline needed for Next.js hydration scripts and Tailwind inline styles
    # fonts.googleapis.com + fonts.gstatic.com needed for Google Fonts (Inter)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
